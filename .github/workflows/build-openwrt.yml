name: 固化打包部署中兴U60P面板

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 去掉多余干扰，强制打包底层核心
      run: |
        echo "=== 开始执行【去多余、加核心】方案 ==="
        
        mkdir -p clean_root
        
        [ -d "www" ] && cp -r www clean_root/
        [ -d "etc" ] && cp -r etc clean_root/
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/
        [ -f "upgrade.sh" ] && cp upgrade.sh clean_root/
        
        if [ -f "clean_root/plugin_boot.sh" ]; then
          chmod 0755 clean_root/plugin_boot.sh
        fi
        
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 纯净包制作成功 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 使用兼容性最好的组件发布（彻底解决403与找不到问题）
      uses: ncipollo/release-action@v1
      with:
        artifacts: "u60pro_luci.tar.gz"
        tag: "2026.07.09-1337"
        name: "2026.07.09-1337"
        body: "自动固化面板包"
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
