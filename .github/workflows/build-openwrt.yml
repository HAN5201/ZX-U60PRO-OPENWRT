name: 固化打包部署中兴U60P面板

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 去掉多余干扰，强制打包底层核心
      run: |
        echo "=== 开始执行【去多余、加核心】方案 ==="
        
        # 强制创建纯净的临时打包根目录，防止重复嵌套
        mkdir -p clean_root
        
        # 【加上核心】把你在仓库里精心准备好的这三个骨架直接塞进去
        [ -d "www" ] && cp -r www clean_root/
        [ -d "etc" ] && cp -r etc clean_root/
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/
        [ -f "upgrade.sh" ] && cp upgrade.sh clean_root/
        
        # 赋予启动脚本最高执行权限
        if [ -f "clean_root/plugin_boot.sh" ]; then
          chmod 0755 clean_root/plugin_boot.sh
        fi
        
        # 原地打包，确保随身WiFi解压时直接能看到这三个文件
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 纯净包制作成功，最终体积大小 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 覆盖发布到固件 Releases 区
      uses: softprops/action-release@v1
      if: success()
      with:
        tag_name: 2026.07.09-1337
        overwrite: true
        files: u60pro_luci.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
