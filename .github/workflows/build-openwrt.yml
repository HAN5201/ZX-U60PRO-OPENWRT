name: U60p Qualcomm Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Package LuCI via Upstream Binaries
      id: pack_u60p
      run: |
        mkdir -p $GITHUB_WORKSPACE/u60pro_luci
        cd $GITHUB_WORKSPACE/u60pro_luci

        # 1. 直接拉取天灵官方最稳定的 armvirt 轻量 LuCI 基础 rootfs 核心
        echo "[1/4] 下载官方轻量 LuCI 镜像核心..."
        wget -qO core.tar.gz https://downloads.immortalwrt.org/releases/23.05.3/targets/armvirt/32/immortalwrt-23.05.3-armvirt-32-rootfs.tar.gz
        tar -xzf core.tar.gz
        rm -f core.tar.gz

        # 2. 注入你要求的网络与安全配置 (IP: 192.168.0.1, 端口: 8080)
        echo "[2/4] 注入网关与端口重定向配置..."
        if [ -f etc/config/network ]; then
          sed -i 's/192.168.1.1/192.168.0.1/g' etc/config/network
        fi
        
        # 兼容 uhttpd 端口配置到 8080 
        if [ -f etc/config/uhttpd ]; then
          sed -i 's/:80/:8080/g' etc/config/uhttpd
        fi

        # 3. 强行注入默认登录密码为 root
        echo "[3/4] 注入 root 加密密码密文..."
        if [ -f etc/shadow ]; then
          sed -i 's/root::0:0:99999:7:::/root:\$1\$wEftA4St\$VclSgNqyKlD8gXmTeoNo.0:0:0:99999:7:::/g' etc/shadow
          sed -i 's/root:\*:/root:\$1\$wEftA4St\$VclSgNqyKlD8gXmTeoNo.0:/g' etc/shadow
        fi

        # 写入版本号
        echo "1.1.0" > VERSION

        # 4. 打包为 JS 脚本所需的文件格式
        echo "[4/4] 压制符合 U60p JS 脚本标准的压缩包..."
        cd $GITHUB_WORKSPACE
        # 将生成的目录包装为标准格式
        mv u60pro_luci u60pro_luci_root
        mkdir -p u60pro_luci
        mv u60pro_luci_root/* u60pro_luci/ 2>/dev/null || true
        
        tar -czf u60pro_luci.tar.gz u60pro_luci

        mkdir -p bin_output
        mv u60pro_luci.tar.gz bin_output/
        echo "FIRMWARE=$GITHUB_WORKSPACE/bin_output" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.pack_u60p.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload u60pro_luci.tar.gz to Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### 🛰️ U60p 随身Wi-Fi 专属 LuCI 挂载包发布 (免编译加速版)
          * 编译时间: ${{ steps.tag.outputs.release_tag }}
          * 文件包名: `u60pro_luci.tar.gz`
          * 默认网关: 192.168.0.1:8080
          * 默认密码: root
