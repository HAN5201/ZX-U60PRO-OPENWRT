name: 云端强拆天灵面板并固化打包

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库文件
      uses: actions/checkout@v3

    - name: 2. 利用 Linux 祖宗级命令强拆 APK/IPK 包
      run: |
        echo "=== 开始在 Linux 环境下强拆天灵核心 ==="
        mkdir -p clean_root
        
        # 1. 新建一个临时目录用来解压 luci-base
        mkdir -p base_tmp
        # 如果你上传的文件名叫 luci-base.apk，直接用 ar x 强拆（Linux 下 ar 是自带的必杀技，绝不提示加密）
        if [ -f "luci-base.apk" ]; then
          cp luci-base.apk base_tmp/ && cd base_tmp
          ar x luci-base.apk 2>/dev/null || tar -xf luci-base.apk 2>/dev/null || true
          [ -f "data.tar.gz" ] && tar -zxf data.tar.gz || true
          [ -f "data.tar.xz" ] && tar -Jxf data.tar.xz || true
          [ -d "www" ] && cp -r www ../clean_root/ || true
          [ -d "usr" ] && cp -r usr ../clean_root/ || true
          cd ..
        fi

        # 2. 同样的方法强拆 luci-mod
        mkdir -p mod_tmp
        if [ -f "luci-mod.apk" ]; then
          cp luci-mod.apk mod_tmp/ && cd mod_tmp
          ar x luci-mod.apk 2>/dev/null || tar -xf luci-mod.apk 2>/dev/null || true
          [ -f "data.tar.gz" ] && tar -zxf data.tar.gz || true
          [ -f "data.tar.xz" ] && tar -Jxf data.tar.xz || true
          [ -d "www" ] && cp -r www/* ../clean_root/www/ 2>/dev/null || true
          [ -d "usr" ] && cp -r usr/* ../clean_root/usr/ 2>/dev/null || true
          cd ..
        fi

        # 3. 合并你原本仓库里的自定义大门和脚本
        [ -d "www" ] && cp -r www/* clean_root/www/ 2>/dev/null || true
        [ -d "etc" ] && cp -r etc clean_root/ 2>/dev/null || true
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/ 2>/dev/null || true
        
        # 统一赋权
        chmod -R 0755 clean_root/www/cgi-bin/ 2>/dev/null || true
        chmod 0755 clean_root/plugin_boot.sh 2>/dev/null || true
        
        # 开始打包
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 云端强拆打包完成，检查体积 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 发布到 Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "u60pro_luci.tar.gz"
        tag: "2026.07.09-1337"
        name: "2026.07.09-1337"
        body: "Linux云端强拆缝合包"
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
