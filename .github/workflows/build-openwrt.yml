name: 固化打包部署中兴U60P天灵面板

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 自动抓取 ImmortalWrt（天灵）全量网页核心
      run: |
        echo "=== 开始抓取天灵高通架构真网页核心 ==="
        mkdir -p clean_root
        cd clean_root
        
        # 核心：使用天灵官方国内优化源，直接抓取天灵的 luci-base 核心
        # 如果这个具体快照版本号有微调，我们直接用包含匹配
        IMM_LUCI_BASE=$(curl -s https://downloads.immortalwrt.org/snapshots/packages/aarch64_cortex-a53/luci/ | grep -o 'luci-base_[^"’]*\.ipk' | head -n 1)
        IMM_LUCI_MOD=$(curl -s https://downloads.immortalwrt.org/snapshots/packages/aarch64_cortex-a53/luci/ | grep -o 'luci-mod-admin-full_[^"’]*\.ipk' | head -n 1)
        
        echo "正在抓取天灵核心组件: $IMM_LUCI_BASE 和 $IMM_LUCI_MOD"
        
        if [ ! -z "$IMM_LUCI_BASE" ]; then
          curl -L -o luci-base.ipk "https://downloads.immortalwrt.org/snapshots/packages/aarch64_cortex-a53/luci/$IMM_LUCI_BASE"
        fi
        if [ ! -z "$IMM_LUCI_MOD" ]; then
          curl -L -o luci-mod.ipk "https://downloads.immortalwrt.org/snapshots/packages/aarch64_cortex-a53/luci/$IMM_LUCI_MOD"
        fi
        
        # 解压天灵包，强行剥离出 www 网页和 usr 控制逻辑
        for f in *.ipk; do
          if [ -f "$f" ]; then
            tar -zxf "$f" data.tar.gz 2>/dev/null || true
            tar -zxf data.tar.gz 2>/dev/null || true
            rm -f data.tar.gz "$f"
          fi
        done
        
        cd ..
        
        # 【加上核心】把你仓库里刚才做好的本地大门文件合并进去
        [ -d "www" ] && cp -r www/* clean_root/www/ 2>/dev/null || true
        [ -d "etc" ] && cp -r etc clean_root/ 2>/dev/null || true
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/ 2>/dev/null || true
        
        # 统一赋权
        chmod -R 0755 clean_root/www/cgi-bin/ 2>/dev/null || true
        chmod 0755 clean_root/plugin_boot.sh 2>/dev/null || true
        
        # 开始打包
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 天灵纯净全量包制作成功 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 使用兼容性最好的组件发布
      uses: ncipollo/release-action@v1
      with:
        artifacts: "u60pro_luci.tar.gz"
        tag: "2026.07.09-1337"
        name: "2026.07.09-1337"
        body: "天灵全家桶核心自动抓取包"
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
