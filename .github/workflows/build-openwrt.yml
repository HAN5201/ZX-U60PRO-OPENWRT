name: 固化打包部署中兴U60P面板

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 去掉多余干扰，强制打包底层核心
      run: |
        echo "=== 开始执行【去多余、加核心】方案 ==="
        
        mkdir -p clean_root
        
        [ -d "www" ] && cp -r www clean_root/
        [ -d "etc" ] && cp -r etc clean_root/
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/
        [ -f "upgrade.sh" ] && cp upgrade.sh clean_root/
        
        if [ -f "clean_root/plugin_boot.sh" ]; then
          chmod 0755 clean_root/plugin_boot.sh
        fi
        
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 纯净包制作成功 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 使用官方原生命令发布（先删后建，彻底避开老版本参数）
      run: |
        echo "正在执行安全覆盖发布..."
        # 如果之前有这个版本的 Release，直接干掉它（允许失败，没有也不报错）
        gh release delete "2026.07.09-1337" --yes 2>/dev/null || true
        
        # 重新创建并上传真包（去掉 --clobber 参数，完美兼容老版本）
        gh release create "2026.07.09-1337" u60pro_luci.tar.gz --title "2026.07.09-1337" --notes "自动固化包"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
