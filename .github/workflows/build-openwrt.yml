name: 固化打包并自动生成校验提示文件

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 打包本地真网页并现场生成提示文件
      run: |
        echo "=== 开始打包本地真网页肉身 ==="
        mkdir -p clean_root
        
        # 强行把你手动传上去的真 www、etc 塞进包里
        [ -d "www" ] && cp -r www clean_root/
        [ -d "etc" ] && cp -r etc clean_root/
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/
        [ -f "upgrade.sh" ] && cp upgrade.sh clean_root/
        
        if [ -f "clean_root/plugin_boot.sh" ]; then
          chmod 0755 clean_root/plugin_boot.sh
        fi
        
        # 【核心操作：打包主程序】
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== === 开始现场生成各种校验提示文件 === ==="
        
        # 1. 生成标准的 MD5 提示文件 (很多脚本靠这个对比)
        md5sum u60pro_luci.tar.gz | awk '{print $1}' > u60pro_luci.tar.gz.md5
        
        # 2. 生成带文件名的 MD5 提示文件 (双保险)
        md5sum u60pro_luci.tar.gz > u60pro_luci.md5
        
        # 3. 现场计算文件大小并生成体积提示文本
        wc -c < u60pro_luci.tar.gz | tr -d '[:space:]' > u60pro_luci.size
        
        # 4. 如果随身WiFi后台是通过 json 校验的，顺便生成一个最新的 ota 提示配置文件
        FILE_SIZE=$(wc -c < u60pro_luci.tar.gz | tr -d '[:space:]')
        FILE_MD5=$(md5sum u60pro_luci.tar.gz | awk '{print $1}')
        
        cat <<EOF > ota-latest.json
        {
          "version": "1.1.0",
          "size": $FILE_SIZE,
          "md5": "$FILE_MD5",
          "file": "u60pro_luci.tar.gz",
          "log": "全量本地面板固化修复包"
        }
        EOF
        
        echo "=== 检查生成的全部提示成果物 ==="
        ls -lh u60pro_luci.tar.gz* ota-latest.json u60pro_luci.md5 u60pro_luci.size 2>/dev/null || true

    - name: 3. 把安装包和全部提示文件发布到 Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "u60pro_luci.tar.gz,u60pro_luci.tar.gz.md5,u60pro_luci.md5,u60pro_luci.size,ota-latest.json"
        tag: "2026.07.09-1337"
        name: "2026.07.09-1337"
        body: "包含自动生成的最新 MD5、Size 提示校验文件，专治全量包校验失败。"
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
