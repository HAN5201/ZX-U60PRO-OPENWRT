name: 固化打包部署中兴U60P面板

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 签出仓库核心文件
      uses: actions/checkout@v3

    - name: 2. 去掉多余干扰，强制打包底层核心
      run: |
        echo "=== 开始执行【去多余、加核心】方案 ==="
        
        mkdir -p clean_root
        
        [ -d "www" ] && cp -r www clean_root/
        [ -d "etc" ] && cp -r etc clean_root/
        [ -f "plugin_boot.sh" ] && cp plugin_boot.sh clean_root/
        [ -f "upgrade.sh" ] && cp upgrade.sh clean_root/
        
        if [ -f "clean_root/plugin_boot.sh" ]; then
          chmod 0755 clean_root/plugin_boot.sh
        fi
        
        cd clean_root
        tar -zcvf ../u60pro_luci.tar.gz *
        cd ..
        
        echo "=== 纯净包制作成功 ==="
        ls -lh u60pro_luci.tar.gz

    - name: 3. 使用官方原生命令发布（彻底去掉第三方组件）
      run: |
        echo "正在强行覆盖发布到 Release..."
        # 自动覆盖旧的标签，强制把真包塞进 Release 附件
        gh release create "2026.07.09-1337" u60pro_luci.tar.gz --title "2026.07.09-1337" --notes "自动固化包" --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
